services:
  bot:
    build: .
    container_name: tadbircore365_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  web:
    build: ./web
    container_name: tadbircore365_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:latest
    container_name: tadbircore365_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped
