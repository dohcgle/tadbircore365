<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tadbircore365 - Xavfsiz Kirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            /* Deep rich blue bank-style background */
            background-color: #0b1c3d;
            background-image: radial-gradient(circle at top right, #1a365d, #0b1c3d);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-2xl overflow-hidden relative">
        <!-- Decorative Header bar -->
        <div class="h-2 w-full bg-blue-600"></div>
        
        <div class="p-8 sm:p-10">
            <!-- Logo & Title -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-800 mb-4 shadow-inner">
                    <i class="fas fa-shield-alt text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Tadbircore365</h1>
                <p class="text-sm font-medium text-blue-600 mt-1 uppercase tracking-wider">Tizim Administratori</p>
                <p class="text-sm text-gray-500 mt-2">Boshqaruv paneliga kirish uchun ma'lumotlaringizni kiriting</p>
            </div>

            {% if error %}
            <!-- Error Alert -->
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 flex items-center text-sm font-medium">
                <i class="fas fa-exclamation-circle mr-2"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Login</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" id="username" name="username" required 
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 text-gray-900 sm:text-sm bg-gray-50 transition-colors" 
                            placeholder="Tizim logini">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Maxfiy parol</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required 
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 text-gray-900 sm:text-sm bg-gray-50 transition-colors" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-colors">
                        Xavfsiz kirish
                        <i class="fas fa-sign-in-alt ml-2 mt-1"></i>
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center text-xs text-gray-400 border-t border-gray-100 pt-6">
                <i class="fas fa-lock mr-1"></i> Barcha ma'lumotlar shifrlangan kanal orqali uzatiladi
            </div>
        </div>
    </div>

</body>
</html>
